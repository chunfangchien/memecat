
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.book-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:12px;font-family:'Noto Sans TC',sans-serif}
.book{width:100%;max-width:600px;background:#FFFDF6;border-radius:16px;box-shadow:0 6px 32px rgba(0,0,0,0.15);overflow:hidden;position:relative}
.scene{width:100%;aspect-ratio:4/3;position:relative;overflow:hidden;cursor:default}
.text-area{padding:16px 24px 20px;border-top:1.5px solid #EDE8DF;display:flex;align-items:flex-start;gap:12px}
.page-num{font-size:0.7rem;color:#B0A090;letter-spacing:0.1em;min-width:24px;padding-top:2px}
.story-text{font-family:'Noto Serif TC',serif;font-size:clamp(0.9rem,2vw,1.05rem);line-height:2;color:#2C2C2C;flex:1}
.nav{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px;padding:0 4px}
.nav-btn{background:#FFFDF6;border:1.5px solid #DDD8CE;color:#6A5C4C;font-family:'Noto Sans TC',sans-serif;font-size:0.85rem;padding:8px 20px;border-radius:30px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:#F5F0E8;border-color:#C8BEB0}
.nav-btn:disabled{opacity:0.3;cursor:default}
.dots{display:flex;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#DDD8CE;transition:all 0.3s;cursor:pointer}
.dot.active{background:#8A7A6A;transform:scale(1.2)}
.page{display:none}
.page.active{display:block}
.hint-tag{position:absolute;font-family:'Noto Sans TC',sans-serif;font-size:11px;background:rgba(255,255,255,0.88);color:#5A4A3A;padding:2px 8px;border-radius:12px;pointer-events:none;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.1);z-index:10}
.page-transition{animation:fadeSlide 0.35s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes wobble{0%,100%{transform:rotate(0)scale(1.05)}25%{transform:rotate(-12deg)scale(1.1)}75%{transform:rotate(12deg)scale(1.1)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)rotate(-3deg)}60%{transform:translateX(5px)rotate(3deg)}}
@keyframes chirpBob{0%,100%{transform:translateY(0)rotate(0)}30%{transform:translateY(-8px)rotate(-8deg)}70%{transform:translateY(-4px)rotate(6deg)}}
@keyframes bloom{0%,100%{transform:scale(1)}50%{transform:scale(1.25)rotate(15deg)}}
@keyframes fishWiggle{0%,100%{transform:rotate(0)}30%{transform:rotate(-10deg)}70%{transform:rotate(10deg)}}
@keyframes ripple{0%{transform:scale(0.8);opacity:0.6}100%{transform:scale(2.5);opacity:0}}
@keyframes starSpin{0%,100%{transform:scale(1)rotate(0)}50%{transform:scale(1.3)rotate(180deg)}}
@keyframes rage {
  0%   { transform: translateX(0)     translateY(0)    rotate(0deg); }
  5%   { transform: translateX(-2px)  translateY(-1px) rotate(-0.5deg); }
  10%  { transform: translateX(3px)   translateY(2px)  rotate(1deg); }
  15%  { transform: translateX(-4px)  translateY(-3px) rotate(-1deg); }
  20%  { transform: translateX(5px)   translateY(1px)  rotate(1.5deg); }
  25%  { transform: translateX(-3px)  translateY(4px)  rotate(-2deg); }
  30%  { transform: translateX(6px)   translateY(-2px) rotate(2deg); }
  35%  { transform: translateX(-7px)  translateY(3px)  rotate(-2.5deg); }
  40%  { transform: translateX(8px)   translateY(-4px) rotate(3deg); }
  45%  { transform: translateX(-6px)  translateY(5px)  rotate(-3deg); }
  50%  { transform: translateX(9px)   translateY(-3px) rotate(3.5deg); }
  55%  { transform: translateX(-10px) translateY(4px)  rotate(-4deg); }
  60%  { transform: translateX(11px)  translateY(-5px) rotate(4deg); }
  65%  { transform: translateX(-9px)  translateY(6px)  rotate(-4.5deg); }
  70%  { transform: translateX(12px)  translateY(-4px) rotate(5deg); }
  75%  { transform: translateX(-11px) translateY(5px)  rotate(-5deg); }
  80%  { transform: translateX(10px)  translateY(-6px) rotate(4deg); }
  85%  { transform: translateX(-8px)  translateY(4px)  rotate(-3deg); }
  90%  { transform: translateX(6px)   translateY(-3px) rotate(2deg); }
  95%  { transform: translateX(-3px)  translateY(2px)  rotate(-1deg); }
  100% { transform: translateX(0)     translateY(0)    rotate(0deg); }
}
@keyframes runAway {
  /* 前半段：chirpBob 跳動 */
  0%   { transform: translateY(0)    rotate(0deg);  opacity: 1; }
  10%  { transform: translateY(-8px) rotate(-8deg); opacity: 1; }
  25%  { transform: translateY(-4px) rotate(6deg);  opacity: 1; }
  40%  { transform: translateY(0)    rotate(0deg);  opacity: 1; }

  /* 中間過渡：回到原點準備右移 */
  50%  { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }

  /* 後半段：直接往右淡出 */
  70%  { transform: translateX(60px);  opacity: 0.8; }
  85%  { transform: translateX(130px); opacity: 0.4; }
  100% { transform: translateX(200px); opacity: 0; }
}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%)translateY(50px);background:#2C2C2C;color:white;padding:8px 20px;border-radius:24px;font-family:'Noto Sans TC',sans-serif;font-size:0.8rem;pointer-events:none;transition:transform 0.3s,opacity 0.3s;opacity:0;z-index:999}
.toast.show{transform:translateX(-50%)translateY(0);opacity:1}
svg.scene-svg{position:absolute;inset:0;width:100%;height:100%}
.clickable{cursor:pointer}

/* 女人的泡泡：尾巴朝下靠左 */
.bubble-woman::after {
  content: '';
  position: absolute;
  bottom: 0px;
  left: 0px;

  border-color: transparent transparent transparent white;

/* 貓咪的泡泡：尾巴朝下靠右 */
.bubble-cat::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 10px 8px 0 8px;
  border-style: solid;
  border-color: white transparent transparent transparent;
}
.bubble.show {
  opacity: 1;
  transform: translateY(0);
}
</style>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx;
function getCtx(){if(!ctx)ctx=new AudioContext();if(ctx.state==='suspended')ctx.resume();return ctx;}

function playTone(type,freq,dur,gain=0.25){
  const ac=getCtx();const o=ac.createOscillator();const g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=type;
  o.frequency.setValueAtTime(freq,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq*0.5,ac.currentTime+dur);
  g.gain.setValueAtTime(gain,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.start();o.stop(ac.currentTime+dur);
}
function playChime(notes,iv=0.12){notes.forEach((f,i)=>setTimeout(()=>playTone('sine',f,0.4,0.2),i*iv*1000));}
function playNoise(dur=0.3,bandFreq=800){
  const ac=getCtx();const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.12;
  const s=ac.createBufferSource();s.buffer=buf;
  const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=bandFreq;
  s.connect(f);f.connect(ac.destination);s.start();s.stop(ac.currentTime+dur);
}
function playBird(){
  const ac=getCtx();const o=ac.createOscillator();const g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type='sine';
  o.frequency.setValueAtTime(1400,ac.currentTime);
  o.frequency.setValueAtTime(1900,ac.currentTime+0.08);
  o.frequency.setValueAtTime(1400,ac.currentTime+0.18);
  o.frequency.setValueAtTime(1800,ac.currentTime+0.26);
  g.gain.setValueAtTime(0.18,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.38);
  o.start();o.stop(ac.currentTime+0.38);
}
function playOwl(){
  const ac=getCtx();const o=ac.createOscillator();const g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type='sine';
  o.frequency.setValueAtTime(350,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(260,ac.currentTime+0.4);
  o.frequency.setValueAtTime(330,ac.currentTime+0.5);
  o.frequency.exponentialRampToValueAtTime(240,ac.currentTime+0.9);
  g.gain.setValueAtTime(0.22,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.9);
  o.start();o.stop(ac.currentTime+0.9);
}
function playWave(){
  const ac=getCtx();const buf=ac.createBuffer(1,ac.sampleRate*0.8,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/ac.sampleRate;d[i]=Math.sin(t*180)*Math.exp(-t*3)*0.2+(Math.random()*2-1)*0.05*Math.exp(-t*2);}
  const s=ac.createBufferSource();s.buffer=buf;
  s.connect(ac.destination);s.start();s.stop(ac.currentTime+0.8);
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000);
}

  const el=document.getElementById(id);if(!el)return;
  el.style.animation='none';void el.offsetWidth;

  setTimeout(()=>el.style.animation='',dur);
}

// ─── Pagination ───
const totalPages=3;
let currentPage=0;

function buildDots(){
  const c=document.getElementById('dots');c.innerHTML='';
  for(let i=0;i<totalPages;i++){
    const d=document.createElement('div');d.className='dot'+(i===0?' active':'');
    d.onclick=()=>goTo(i);c.appendChild(d);
  }
}
function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentPage));
}
function goTo(n){
  document.getElementById('page-'+currentPage).classList.remove('active');
  currentPage=n;
  const p=document.getElementById('page-'+currentPage);
  p.classList.add('active','page-transition');
  p.addEventListener('animationend',()=>p.classList.remove('page-transition'),{once:true});
  document.getElementById('btn-prev').disabled=currentPage===0;
  document.getElementById('btn-next').disabled=currentPage===totalPages-1;
  updateDots();
}
function changePage(dir){
  const next=currentPage+dir;
  if(next>=0&&next<totalPages)goTo(next);
}

buildDots();
